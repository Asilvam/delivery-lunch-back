# fly.toml app configuration file generated for delivery-lunch-back on 2026-04-14T07:05:27-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'delivery-lunch-back'
primary_region = 'gru'

[build]

[env]
  NODE_ENV = "production"
  PORT = "3500"

# Variables sensibles — NO van aquí, usar:
# fly secrets set MONGODB_URI="..." JWT_SECRET="..." etc.

[http_service]
  internal_port = 3500
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
